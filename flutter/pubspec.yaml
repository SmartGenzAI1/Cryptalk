name: cryptalk
description: Secure real-time messaging. Private by default, fast by design.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  socket_io_client: ^3.0.0
  flutter_secure_storage: ^9.2.0
  cryptography: ^2.7.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  go_router: ^14.2.0
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    - assets/lottie/
    - assets/icons/defaults/
