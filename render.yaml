services:
  - type: web
    name: cryptalk-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:asgi_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SESSION_SECRET
        sync: false
      - key: DB_PATH
        value: /var/data/cryptalk.db
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
