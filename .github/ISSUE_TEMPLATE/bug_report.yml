name: 🐛 Bug Report
description: Report a bug to help us improve Cryptalk
title: '[BUG] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what the bug is.
      placeholder: 'When I send a message, the...'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (Python/FastAPI)
        - Frontend (Next.js)
        - Realtime (Socket.IO)
        - AI features
        - Auth
        - UI/UX
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser/OS (if frontend)
      placeholder: 'Chrome 120, macOS 14'

  - type: textarea
    id: logs
    attributes:
      label: Logs / errors
      description: Any relevant console or server logs.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots.
